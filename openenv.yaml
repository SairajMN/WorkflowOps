name: AutoClean-Ai
description: |
  An OpenEnv RL environment for training AI agents on real-world data cleaning tasks.
  Agents learn to identify and fix missing values, duplicates, inconsistent formats,
  outliers, and other data quality issues.

  Features 10 standard data cleaning operations, 3 progressive difficulty tasks,
  shaped rewards for partial progress, and deterministic grading from 0.0-1.0.

version: 1.0.0
author: community
license: MIT

# OpenEnv configuration
openenv:
  env_type: custom

  server:
    port: 7860
    host: 0.0.0.0

  parameters:
    max_questions: 10

  # Required OpenEnv endpoints
  required_endpoints:
    tasks:    GET  /tasks
    grader:   POST /grader
    baseline: POST /baseline

  entry_points:
    server: server.app:app
    client: 

# Tasks (easy → medium → hard)
tasks:
  - id: task_1_basic_cleaning
    name: Basic Data Cleaning
    difficulty: beginner
    description: >
      Simple cleaning: remove null values and duplicate rows from 100 row dataset.
      Grader rewards proper null and duplicate handling.

  - id: task_2_intermediate_cleaning
    name: Intermediate Data Cleaning
    difficulty: intermediate
    description: >
      Intermediate tasks: fill missing values, validate emails, remove outliers from 200 row dataset.
      Grader evaluates data quality improvements.

  - id: task_3_full_pipeline
    name: Full Data Cleaning Pipeline
    difficulty: advanced
    description: >
      Complete end-to-end pipeline on 500 row dataset with all cleaning operations.
      Includes type conversion, normalization, and comprehensive quality checks.

# Dependencies
dependencies:
  - openenv-core>=0.2.0
  - fastapi>=0.100.0
  - uvicorn>=0.23.0
  - requests>=2.31.0
  - openai>=1.0.0

# Tags for discovery
tags:
  - data-cleaning
  - data-preprocessing
  - ml-pipeline
  - data-quality
  - rl-environment
  - agent-training
  - tabular-data

# All 38 datasets
datasets:
